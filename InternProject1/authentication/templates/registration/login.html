{% extends "FlashReports/Base/base.html" %}

{% block content %}
<div class="container mt-5 d-flex justify-content-center">
  <div class="card p-4 shadow" style="max-width: 400px; width: 100%;">
    <h4 class="text-center mb-4">Connexion</h4>
    <form method="POST" action="{% url 'login' %}">
      {% csrf_token %}
      
      <div class="form-floating mb-3">
        <input type="text" class="form-control" id="floatingInput" placeholder="name@example.com" name="username" required>
        <label for="floatingInput">Adresse email</label>
      </div>
      
      <div class="form-floating mb-4">
        <input type="password" class="form-control" id="floatingPassword" placeholder="Mot de passe" name="password" required>
        <label for="floatingPassword">Mot de passe</label>
      </div>
      
      <button type="submit" class="btn btn-primary w-100">Se connecter</button>
    </form>
    <br>
    <div class="justify-content-evenly">
      <p> Vous n'aviez pas de compte? Inscrivez-vous!</p>
      <a type="button" href="{% url 'signup' %}"class="btn btn-primary w-100">S'inscrire</a>
    </div>
  </div>
</div>
{% endblock %}
