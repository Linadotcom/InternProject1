{% extends 'FlashReports/Base/base.html' %}

{% block content %}

<div class="container mt-4">
  <div class="card">
    <div class="card-header">
      <h5 class="card-title">Supprimer l'observation</h5>
    </div>
    <div class="card-body">
      <p>> Etes-vous sure de vouloir supprimer cette observation: "<strong>{{ incident.title }}</strong>" ?</p>
    </div>
    <div class="card-footer">
      <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Oui, supprimer</button>
        <a href="{% url 'incidents_list' %}" class="btn btn-secondary">Annuler</a>
      </form>
    </div>
  </div>
</div>

{% endblock %}
