{% extends 'FlashReports/Base/base.html' %}

{% block content %}
<div class="container mt-4">
  <h2>{{ form.instance.pk|yesno:"Edit incident,Add incident" }}</h2>
  
  <form method="post"  enctype="multipart/form-data">
    {% csrf_token %}
    
    <!-- title Field -->
    <div class="mb-3">
      <label for="{{ form.title.id_for_label }}" class="form-label">Titre</label>
      {{ form.title }}
    </div> 

    <!-- Description Field -->
    <div class="mb-3">
      <label for="{{ form.description.id_for_label }}" class="form-label">Description</label>
      {{ form.description }}
    </div>


    <!-- Buttons -->
    <button type="submit" class="btn btn-success">
      {{ form.instance.pk|yesno:"Update,Save" }}
    </button>

    <a href="{% url 'incidents_list' %}" class="btn btn-secondary">Cancel</a>
  </form>
</div>
{% endblock %}
